name: Desktop Release

# デスクトップ版(Electron / NSIS + electron-updater)を GitHub Release へ公開する。
# 使い方:  electron-app/package.json の version を上げて
#          `git tag desktop-v1.3.0 && git push origin desktop-v1.3.0`
# → Windows で NSIS インストーラ(FutaMindMap-setup.exe)と latest.yml をビルドし、
#    リリース v{version} へ公開する。各PCのアプリは electron-updater が latest.yml を
#    読んで自動で更新する。中身(機能)は Vercel が常に最新を配信。
#
# ⚠ futa-mind-map は public リポなので Release は同一リポへ出す(配信専用リポ不要)。
# ⚠ latest.yml が無いと自動更新が一切効かないため、安全弁で再アップロードする。

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: electron-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build NSIS & publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: Re-upload assets & mark latest (safety valve)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "v$ver"
          # exe / blockmap / latest.yml を必ず再アップロード(取りこぼし対策)
          $assets = Get-ChildItem dist |
            Where-Object { $_.Name -match '\.(exe|blockmap)$' -or $_.Name -eq 'latest.yml' } |
            ForEach-Object { $_.FullName }
          gh release upload $tag $assets --clobber -R ${{ github.repository }}
          # draft を外して最新リリースに(electron-updater は draft を無視するため必須)
          gh release edit $tag --draft=false --latest -R ${{ github.repository }}
