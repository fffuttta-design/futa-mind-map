name: Desktop Release

# デスクトップ版(Electron / ポータブル)を GitHub Releases へ公開する。
# 使い方:  electron-app/package.json の version を上げて
#          `git tag desktop-v1.2.0 && git push origin desktop-v1.2.0`
# → Windows でポータブルEXEをビルドし、Release に添付する。
#
# ポータブル版は自動更新を行わない。中身(Webアプリ)は Vercel が常に最新を
# 配信するため、EXE を置くだけで常に最新の状態で使える。

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: electron-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build portable EXE
        run: npm run build

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $exe = (Get-ChildItem dist/*.exe | Select-Object -First 1).FullName
          $existing = gh release view $tag -R ${{ github.repository }} 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag -R ${{ github.repository }} --clobber "$exe"
          } else {
            gh release create $tag -R ${{ github.repository }} `
              --title "FutaMindMap Desktop (Portable) $tag" `
              --notes "ポータブル版。EXEをダウンロードして実行するだけ（インストール不要）。中身はVercelで常に最新です。" `
              "$exe"
          }
