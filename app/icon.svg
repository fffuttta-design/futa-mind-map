<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="13" fill="#6366f1"/>

  <!-- Connection lines: center → children -->
  <line x1="17" y1="30" x2="22" y2="20" stroke="rgba(255,255,255,0.65)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="17" y1="34" x2="22" y2="44" stroke="rgba(255,255,255,0.65)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="47" y1="30" x2="42" y2="20" stroke="rgba(255,255,255,0.65)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="47" y1="34" x2="42" y2="44" stroke="rgba(255,255,255,0.65)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Child nodes (left) -->
  <rect x="2"  y="14" width="20" height="10" rx="5" fill="white" fill-opacity="0.85"/>
  <rect x="2"  y="40" width="20" height="10" rx="5" fill="white" fill-opacity="0.85"/>

  <!-- Center node -->
  <rect x="15" y="26" width="34" height="12" rx="6" fill="white"/>

  <!-- Child nodes (right) -->
  <rect x="42" y="14" width="20" height="10" rx="5" fill="white" fill-opacity="0.85"/>
  <rect x="42" y="40" width="20" height="10" rx="5" fill="white" fill-opacity="0.85"/>
</svg>
