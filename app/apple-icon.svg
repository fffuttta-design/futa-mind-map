<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="#6366f1"/>

  <!-- Connection lines: center → children -->
  <line x1="48"  y1="84"  x2="62"  y2="56"  stroke="rgba(255,255,255,0.65)" stroke-width="7" stroke-linecap="round"/>
  <line x1="48"  y1="96"  x2="62"  y2="124" stroke="rgba(255,255,255,0.65)" stroke-width="7" stroke-linecap="round"/>
  <line x1="132" y1="84"  x2="118" y2="56"  stroke="rgba(255,255,255,0.65)" stroke-width="7" stroke-linecap="round"/>
  <line x1="132" y1="96"  x2="118" y2="124" stroke="rgba(255,255,255,0.65)" stroke-width="7" stroke-linecap="round"/>

  <!-- Child nodes (left) -->
  <rect x="6"   y="40"  width="56" height="28" rx="14" fill="white" fill-opacity="0.85"/>
  <rect x="6"   y="112" width="56" height="28" rx="14" fill="white" fill-opacity="0.85"/>

  <!-- Center node -->
  <rect x="42"  y="73"  width="96" height="34" rx="17" fill="white"/>

  <!-- Child nodes (right) -->
  <rect x="118" y="40"  width="56" height="28" rx="14" fill="white" fill-opacity="0.85"/>
  <rect x="118" y="112" width="56" height="28" rx="14" fill="white" fill-opacity="0.85"/>
</svg>
